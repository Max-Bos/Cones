<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    const url = window.location.href;
    const base = window.location.origin + "/Cones/";
    const rest = url.replace(window.location.origin, "");
    sessionStorage.setItem("cones_redirect", rest);
    window.location.replace(base);
  </script>
</head>
<body></body>
</html>
