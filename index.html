<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cones</title>

  <!-- PWA -->
  <meta name="theme-color" content="#C4884A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cones" />
  <link rel="manifest" href="manifest.json" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FDFAF6;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #3D2B1A;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    input, textarea, button { font-family: inherit; }
    input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px #C4884A40; }
    textarea { resize: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SUPABASE_URL = "https://idfxmacdmyzhrwqjeidl.supabase.co";
    const SUPABASE_KEY = "sb_publishable_kLkc8DvWZ9cTVeLk5mBB0Q_IwSD95eR";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const W = {
      bg: "#FDFAF6", surface: "#F7F2EA", border: "#E8DFD0",
      accent: "#C4884A", accentDark: "#8B5E30",
      text: "#3D2B1A", muted: "#8C7560", faint: "#B5A08A",
      done: "#5A8A5A", doneBg: "#EDF5ED",
      streakBg: "#FEF3E2", streakBorder: "#EAC98A",
    };

    const todayKey = () => new Date().toISOString().slice(0, 10);
    const last30 = () => {
      const days = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toISOString().slice(0, 10));
      }
      return days;
    };

    const computeStreak = (habitId, completions) => {
      let streak = 0;
      const d = new Date();
      while (true) {
        const dateStr = d.toISOString().slice(0, 10);
        const found = completions.find(c => c.habit_id === habitId && c.date === dateStr);
        if (found) { streak++; d.setDate(d.getDate() - 1); }
        else break;
      }
      return streak;
    };

    function Spinner() {
      return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "60vh" }}>
          <div style={{
            width: 28, height: 28, borderRadius: "50%",
            border: `2px solid ${W.border}`,
            borderTopColor: W.accent,
            animation: "spin 0.7s linear infinite",
          }} />
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      );
    }

    function App() {
      const [habits,      setHabits]      = useState([]);
      const [completions, setCompletions] = useState([]);
      const [newName,     setNewName]     = useState("");
      const [expanded,    setExpanded]    = useState({});
      const [loading,     setLoading]     = useState(true);
      const [saving,      setSaving]      = useState(false);

      const today = todayKey();
      const days  = last30();

      const fetchAll = useCallback(async () => {
        const [{ data: h }, { data: c }] = await Promise.all([
          sb.from("habits").select("*").order("created_at"),
          sb.from("completions").select("*"),
        ]);
        setHabits(h || []);
        setCompletions(c || []);
        setLoading(false);
      }, []);

      useEffect(() => { fetchAll(); }, [fetchAll]);

      const addHabit = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        const id = Date.now().toString();
        const { data } = await sb.from("habits").insert({ id, name: newName.trim() }).select().single();
        if (data) setHabits(h => [...h, data]);
        setNewName("");
        setSaving(false);
      };

      const deleteHabit = async (id) => {
        await sb.from("habits").delete().eq("id", id);
        setHabits(h => h.filter(x => x.id !== id));
        setCompletions(c => c.filter(x => x.habit_id !== id));
      };

      const toggle = async (habitId) => {
        const existing = completions.find(c => c.habit_id === habitId && c.date === today);
        if (existing) {
          await sb.from("completions").delete().eq("id", existing.id);
          setCompletions(c => c.filter(x => x.id !== existing.id));
        } else {
          const id = `${habitId}_${today}`;
          const { data } = await sb.from("completions").insert({ id, habit_id: habitId, date: today, note: "" }).select().single();
          if (data) setCompletions(c => [...c, data]);
        }
      };

      const setNote = async (habitId, val) => {
        const existing = completions.find(c => c.habit_id === habitId && c.date === today);
        if (existing) {
          await sb.from("completions").update({ note: val }).eq("id", existing.id);
          setCompletions(c => c.map(x => x.id === existing.id ? { ...x, note: val } : x));
        } else {
          const id = `${habitId}_${today}`;
          const { data } = await sb.from("completions").insert({ id, habit_id: habitId, date: today, note: val }).select().single();
          if (data) setCompletions(c => [...c, data]);
        }
      };

      const doneToday = habits.filter(h => completions.find(c => c.habit_id === h.id && c.date === today)).length;
      const pct = habits.length ? Math.round((doneToday / habits.length) * 100) : 0;

      const dateStr = new Date().toLocaleDateString("en-NL", {
        weekday: "long", month: "long", day: "numeric",
      });

      const heatFills = ["#EDE5D8","#F0D4B0","#E0B070", W.accent, W.accentDark];

      if (loading) return (
        <div style={{ maxWidth: 520, margin: "0 auto", padding: "2rem 1.25rem" }}>
          <h1 style={{ fontSize: 22, fontWeight: 500, letterSpacing: "-0.02em", marginBottom: 4 }}>Cones</h1>
          <Spinner />
        </div>
      );

      return (
        <div style={{ maxWidth: 520, margin: "0 auto", padding: "2rem 1.25rem", minHeight: "100vh" }}>

          {/* Header */}
          <div style={{ marginBottom: "2rem" }}>
            <h1 style={{ fontSize: 22, fontWeight: 500, letterSpacing: "-0.02em" }}>Cones</h1>
            <p style={{ fontSize: 13, color: W.muted, marginTop: 4 }}>{dateStr}</p>
          </div>

          {/* Add row */}
          <div style={{ display: "flex", gap: 8, marginBottom: "1.75rem" }}>
            <input
              value={newName}
              onChange={e => setNewName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addHabit()}
              placeholder="Add a new habit..."
              style={{
                flex: 1, border: `0.5px solid ${W.border}`, borderRadius: 10,
                padding: "8px 12px", fontSize: 14, background: W.surface, color: W.text,
              }}
            />
            <button
              onClick={addHabit}
              disabled={saving}
              style={{
                border: `0.5px solid ${W.accent}`, borderRadius: 10, padding: "8px 16px",
                fontSize: 13, fontWeight: 500, background: W.accent, color: "#fff",
                cursor: saving ? "default" : "pointer", opacity: saving ? 0.6 : 1,
              }}
            >{saving ? "..." : "Add"}</button>
          </div>

          {/* Empty state */}
          {habits.length === 0 && (
            <p style={{ textAlign: "center", color: W.faint, fontSize: 14, padding: "2rem 0" }}>
              No habits yet — add one above to get started.
            </p>
          )}

          {/* Habit cards */}
          {habits.map(h => {
            const completion = completions.find(c => c.habit_id === h.id && c.date === today);
            const done     = !!completion;
            const streak   = computeStreak(h.id, completions);
            const isOpen   = !!expanded[h.id];
            const noteVal  = completion?.note || "";
            const heatData = days.map(d => completions.find(c => c.habit_id === h.id && c.date === d) ? 2 : 0);

            return (
              <div key={h.id} style={{
                background: done ? W.doneBg : W.surface,
                border: `0.5px solid ${done ? "#C5DEC5" : W.border}`,
                borderRadius: 12, padding: "14px 16px", marginBottom: 10,
                transition: "background 0.2s",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div
                    onClick={() => toggle(h.id)}
                    style={{
                      width: 20, height: 20, borderRadius: 6, flexShrink: 0, cursor: "pointer",
                      border: `1.5px solid ${done ? W.done : W.border}`,
                      background: done ? W.done : "transparent",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      transition: "all 0.15s",
                    }}
                  >
                    {done && (
                      <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                        <path d="M1 4L4 7.5L10 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    )}
                  </div>

                  <span style={{
                    fontSize: 15, fontWeight: 500, flex: 1,
                    color: done ? W.done : W.text,
                    textDecoration: done ? "line-through" : "none",
                    opacity: done ? 0.7 : 1,
                  }}>{h.name}</span>

                  {streak > 0 && (
                    <span style={{
                      fontSize: 12, fontWeight: 500, color: W.accentDark,
                      background: W.streakBg, border: `0.5px solid ${W.streakBorder}`,
                      borderRadius: 20, padding: "2px 10px", flexShrink: 0,
                    }}>{streak} day{streak !== 1 ? "s" : ""}</span>
                  )}

                  <button
                    onClick={() => setExpanded(e => ({ ...e, [h.id]: !e[h.id] }))}
                    style={{ fontSize: 12, color: W.faint, background: "none", border: "none", cursor: "pointer", padding: "0 4px" }}
                  >{isOpen ? "▲" : "▼"}</button>

                  <button
                    onClick={() => deleteHabit(h.id)}
                    style={{ fontSize: 18, color: W.faint, background: "none", border: "none", cursor: "pointer", padding: "0 2px", lineHeight: 1 }}
                  >&times;</button>
                </div>

                {isOpen && (
                  <div style={{ marginTop: 10, borderTop: `0.5px solid ${W.border}`, paddingTop: 10 }}>
                    <div style={{ fontSize: 11, color: W.faint, marginBottom: 6, fontWeight: 500, letterSpacing: "0.05em", textTransform: "uppercase" }}>
                      Last 30 days
                    </div>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 10 }}>
                      {heatData.map((lvl, i) => (
                        <div key={i} title={days[i]} style={{
                          width: 14, height: 14, borderRadius: 3,
                          background: heatFills[Math.min(lvl, 4)], flexShrink: 0,
                        }}/>
                      ))}
                    </div>
                    <textarea
                      rows={2}
                      placeholder="Note for today..."
                      value={noteVal}
                      onChange={e => setNote(h.id, e.target.value)}
                      style={{
                        width: "100%", border: `0.5px solid ${W.border}`, borderRadius: 8,
                        padding: "6px 10px", fontSize: 13, color: W.text, background: W.bg,
                        lineHeight: 1.5,
                      }}
                    />
                  </div>
                )}
              </div>
            );
          })}

          {/* Progress */}
          {habits.length > 0 && (
            <div style={{ marginTop: "2rem", paddingTop: "1.5rem", borderTop: `0.5px solid ${W.border}` }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: W.faint, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: "1rem" }}>
                Today's progress
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: W.muted, marginBottom: 6 }}>
                <span>{doneToday} of {habits.length} done</span>
                <span style={{ fontWeight: 500, color: pct === 100 ? W.done : W.accent }}>{pct}%</span>
              </div>
              <div style={{ height: 6, borderRadius: 4, background: W.border, overflow: "hidden" }}>
                <div style={{
                  height: "100%", width: `${pct}%`,
                  background: pct === 100 ? W.done : W.accent,
                  borderRadius: 4, transition: "width 0.4s ease",
                }}/>
              </div>
              {pct === 100 && (
                <p style={{ fontSize: 13, color: W.done, marginTop: 8, fontWeight: 500 }}>All done for today ✓</p>
              )}
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
